---
name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install locked dependencies
        shell: pwsh
        run: |
          uv sync --group dev --locked
          npm ci --omit=dev

      - name: Run release quality gates
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync pytest -q
          npm audit --omit=dev --package-lock-only --audit-level=moderate

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Verify release tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: python .\scripts\release_version.py verify "${{ github.ref_name }}" --against-git-tags

      - name: Build portable Windows bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows_release.ps1

      - name: Build Windows installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows_installer.ps1 -SkipBundleBuild

      - name: Create installer checksum
        shell: pwsh
        run: |
          $installer = "release\installer\stt_app-win-x64-setup.exe"
          $checksum = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
          "$checksum  stt_app-win-x64-setup.exe" |
              Set-Content -Encoding ASCII "$installer.sha256"

      - name: Upload manual workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: stt_app-windows-release
          if-no-files-found: error
          retention-days: 3
          # The portable bundle is only uploaded zipped; adding the unpacked
          # folder as well doubled the artifact size and burned the free
          # Actions storage quota (GB-months) for no benefit.
          path: |
            release/stt_app-win-x64.zip
            release/installer/stt_app-win-x64-setup.exe
            release/installer/stt_app-win-x64-setup.exe.sha256

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @'
          Windows release assets for stt_app:

          - `stt_app-win-x64-setup.exe`
            Recommended for most users. Runs a normal Windows installer and creates Start-menu shortcuts.

          - `stt_app-win-x64-setup.exe.sha256`
            SHA-256 checksum used by the in-app updater to verify the installer download.

          - `stt_app-win-x64.zip`
            Portable bundle. Extract it anywhere and run `stt_app.exe` from the extracted folder.

          - `Source code (zip/tar.gz)`
            GitHub adds these archives automatically. They contain the repository
            source for developers, not the built Windows app.
          '@ | Set-Content -Encoding UTF8 $notesPath

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release edit $tag --notes-file $notesPath
              gh release upload $tag `
                  "release\stt_app-win-x64.zip" `
                  "release\installer\stt_app-win-x64-setup.exe" `
                  "release\installer\stt_app-win-x64-setup.exe.sha256" `
                  --clobber
          }
          else {
              gh release create $tag `
                  "release\stt_app-win-x64.zip" `
                  "release\installer\stt_app-win-x64-setup.exe" `
                  "release\installer\stt_app-win-x64-setup.exe.sha256" `
                  --title $tag `
                  --notes-file $notesPath
          }
