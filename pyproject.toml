[project]
name = "tts-app"
version = "0.1.0"
description = "Windows 11 dictation app MVP (Phase 1)"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "PySide6==6.8.2.1",
    "sounddevice==0.5.1",
    "numpy==2.2.2",
    "faster-whisper==1.1.0",
    "requests==2.32.3",
    "keyring==25.6.0",
    "pywin32==308",
]

[project.scripts]
tts-app = "tts_app.main:run"

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tts_app"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q"

[dependency-groups]
dev = [
    "pytest==8.3.4",
    "pytest-mock==3.14.0",
]
